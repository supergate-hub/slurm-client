name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start Slurm cluster
        run: |
          git clone --depth 1 https://github.com/giovtorres/slurm-docker-cluster.git /tmp/slurm-cluster
          cd /tmp/slurm-cluster
          cp .env.example .env 2>/dev/null || true
          docker compose build
          docker compose up -d

      - name: Wait for slurmrestd to be healthy
        run: |
          echo "Waiting for slurmrestd to be healthy..."
          timeout 120 bash -c '
            until docker compose -f /tmp/slurm-cluster/docker-compose.yml ps slurmrestd 2>/dev/null | grep -q "healthy"; do
              echo "  waiting..."
              sleep 5
            done
          '
          echo "slurmrestd is healthy"

      - name: Get JWT token
        id: token
        run: |
          TOKEN=$(docker exec slurmctld scontrol token lifespan=3600 | grep -oP 'SLURM_JWT=\K.*')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Verify slurmrestd connectivity
        run: |
          TOKEN=${{ steps.token.outputs.token }}
          curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:6820/openapi/v3 | head -c 200
          echo ""
          echo "slurmrestd is accessible on localhost:6820"

      - name: Run SDK integration tests (REST backend)
        env:
          SLURM_TEST_ENDPOINT: "http://localhost:6820"
          SLURM_TEST_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          go test -tags integration -v -count=1 -timeout 120s .

      - name: Build MCP server
        run: go build -o slurm-mcp ./cmd/slurm-mcp/

      - name: Test MCP server startup (REST, default tools)
        env:
          SLURM_ENDPOINT: "http://localhost:6820"
          SLURM_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          timeout 5 ./slurm-mcp 2>&1 || true
          echo "MCP server starts successfully with default (8) tools"

      - name: Test MCP server startup (REST, all tools)
        env:
          SLURM_ENDPOINT: "http://localhost:6820"
          SLURM_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          timeout 5 ./slurm-mcp --all-tools 2>&1 || true
          echo "MCP server starts successfully with all tools"

      - name: Test MCP server SSH backend message
        run: |
          output=$(./slurm-mcp --backend=ssh 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "not yet available\|SSH" && echo "SSH backend correctly reports not available"

      - name: Cleanup
        if: always()
        run: |
          cd /tmp/slurm-cluster 2>/dev/null && docker compose down -v || true
